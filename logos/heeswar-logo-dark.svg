<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 200" width="600" height="200">
  <defs>
    <linearGradient id="goldAccentDark" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#C9A94E;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#E8D48B;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#C9A94E;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Dark background -->
  <rect width="600" height="200" fill="#0a0a0a" rx="0"/>

  <!-- Camera Lens Element -->
  <g transform="translate(56, 100)">
    <circle cx="0" cy="0" r="38" fill="none" stroke="#f0f0f0" stroke-width="2.5"/>
    <circle cx="0" cy="0" r="28" fill="none" stroke="#f0f0f0" stroke-width="1.5"/>
    <path d="M0,-28 L8,-12 L-8,-12 Z" fill="#f0f0f0" opacity="0.8" transform="rotate(0)"/>
    <path d="M0,-28 L8,-12 L-8,-12 Z" fill="#f0f0f0" opacity="0.8" transform="rotate(60)"/>
    <path d="M0,-28 L8,-12 L-8,-12 Z" fill="#f0f0f0" opacity="0.8" transform="rotate(120)"/>
    <path d="M0,-28 L8,-12 L-8,-12 Z" fill="#f0f0f0" opacity="0.8" transform="rotate(180)"/>
    <path d="M0,-28 L8,-12 L-8,-12 Z" fill="#f0f0f0" opacity="0.8" transform="rotate(240)"/>
    <path d="M0,-28 L8,-12 L-8,-12 Z" fill="#f0f0f0" opacity="0.8" transform="rotate(300)"/>
    <circle cx="0" cy="0" r="5" fill="#f0f0f0"/>
  </g>

  <!-- HEESWAR -->
  <text x="110" y="108" font-family="'Didot', 'Playfair Display', 'Georgia', serif" font-size="52" font-weight="400" letter-spacing="14" fill="#f0f0f0" text-anchor="start">HEESWAR</text>

  <!-- Gold line -->
  <line x1="112" y1="122" x2="540" y2="122" stroke="url(#goldAccentDark)" stroke-width="1"/>

  <!-- PHOTOGRAPHY -->
  <text x="327" y="148" font-family="'Montserrat', 'Helvetica Neue', 'Arial', sans-serif" font-size="16" font-weight="300" letter-spacing="10" fill="#999999" text-anchor="middle">PHOTOGRAPHY</text>
</svg>