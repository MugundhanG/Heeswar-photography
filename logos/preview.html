<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Heeswar Photography - Logo Suite</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Montserrat:wght@300;400&family=Dancing+Script:wght@400;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Montserrat', sans-serif; background: #f5f5f5; color: #333; }
  .header { text-align: center; padding: 60px 20px 40px; }
  .header h1 { font-family: 'Playfair Display', serif; font-size: 28px; font-weight: 400; letter-spacing: 6px; color: #1a1a1a; }
  .header p { font-size: 12px; letter-spacing: 4px; color: #999; margin-top: 10px; text-transform: uppercase; }
  .grid { max-width: 1000px; margin: 0 auto; padding: 20px; display: flex; flex-direction: column; gap: 40px; }
  .card { background: #fff; border-radius: 8px; padding: 40px; box-shadow: 0 2px 20px rgba(0,0,0,0.06); }
  .card.dark { background: #0a0a0a; }
  .card.checker {
    background-image: linear-gradient(45deg, #e0e0e0 25%, transparent 25%),
      linear-gradient(-45deg, #e0e0e0 25%, transparent 25%),
      linear-gradient(45deg, transparent 75%, #e0e0e0 75%),
      linear-gradient(-45deg, transparent 75%, #e0e0e0 75%);
    background-size: 20px 20px;
    background-position: 0 0, 0 10px, 10px -10px, -10px 0px;
  }
  .card.photo {
    background: url('https://images.unsplash.com/photo-1506905925346-21bda4d32df4?w=1000&q=80') center/cover;
    min-height: 200px;
    display: flex;
    align-items: flex-end;
    padding: 30px;
  }
  .card h3 { font-family: 'Montserrat', sans-serif; font-size: 11px; letter-spacing: 4px; text-transform: uppercase; color: #999; margin-bottom: 24px; font-weight: 300; }
  .card.dark h3 { color: #666; }
  .card img, .card object { max-width: 100%; height: auto; display: block; margin: 0 auto; }
  .row { display: flex; gap: 40px; }
  .row > * { flex: 1; }
  .footer { text-align: center; padding: 60px 20px; font-size: 11px; color: #bbb; letter-spacing: 3px; }
  @media (max-width: 700px) { .row { flex-direction: column; } }
</style>
</head>
<body>

<div class="header">
  <h1>HEESWAR PHOTOGRAPHY</h1>
  <p>Brand Identity &mdash; Logo Suite</p>
</div>

<div class="grid">

  <!-- 1. Main Logo - Light -->
  <div class="card">
    <h3>1 &mdash; Primary Logo (Light Background)</h3>
    <img src="heeswar-logo-main.svg" alt="Heeswar Photography Main Logo">
  </div>

  <!-- 2. Main Logo - Dark -->
  <div class="card dark">
    <h3>2 &mdash; Primary Logo (Dark Background)</h3>
    <img src="heeswar-logo-dark.svg" alt="Heeswar Photography Dark Logo">
  </div>

  <!-- 3. Cinematic -->
  <div class="card dark">
    <h3>3 &mdash; Luxury Cinematic Style</h3>
    <img src="heeswar-cinematic.svg" alt="Heeswar Photography Cinematic Logo">
  </div>

  <!-- 4. Signature + Monogram side by side -->
  <div class="row">
    <div class="card">
      <h3>4 &mdash; Signature Style</h3>
      <img src="heeswar-logo-signature.svg" alt="Heeswar Photography Signature Logo">
    </div>
    <div class="card" style="display:flex;flex-direction:column;align-items:center;justify-content:center;">
      <h3 style="align-self:stretch;">5 &mdash; HP Monogram</h3>
      <img src="heeswar-monogram.svg" alt="HP Monogram" style="max-width:220px;">
    </div>
  </div>

  <!-- 5. Watermark on photo -->
  <div class="card photo">
    <img src="heeswar-watermark.svg" alt="Watermark Preview" style="max-width:320px;">
  </div>

  <!-- 6. Watermark on transparency -->
  <div class="card checker">
    <h3>6 &mdash; Watermark (Transparent Overlay)</h3>
    <div style="background:#333;border-radius:4px;padding:20px;display:inline-block;margin:0 auto;display:flex;justify-content:center;">
      <img src="heeswar-watermark.svg" alt="Watermark" style="max-width:320px;">
    </div>
  </div>

</div>

<div class="footer">
  HEESWAR PHOTOGRAPHY &bull; BRAND IDENTITY SUITE &bull; SVG VECTOR FORMAT
</div>

</body>
</html>
