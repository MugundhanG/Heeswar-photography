<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300" width="300" height="300">
  <defs>
    <linearGradient id="goldMono" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#C9A94E;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#E8D48B;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#C9A94E;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Outer lens ring -->
  <circle cx="150" cy="150" r="130" fill="none" stroke="#1a1a1a" stroke-width="3"/>
  <!-- Second ring -->
  <circle cx="150" cy="150" r="120" fill="none" stroke="#1a1a1a" stroke-width="1.5"/>

  <!-- Subtle aperture hints on the ring -->
  <line x1="150" y1="20" x2="150" y2="30" stroke="#1a1a1a" stroke-width="1.5"/>
  <line x1="150" y1="270" x2="150" y2="280" stroke="#1a1a1a" stroke-width="1.5"/>
  <line x1="20" y1="150" x2="30" y2="150" stroke="#1a1a1a" stroke-width="1.5"/>
  <line x1="270" y1="150" x2="280" y2="150" stroke="#1a1a1a" stroke-width="1.5"/>

  <!-- Diagonal ticks -->
  <line x1="242" y1="58" x2="235" y2="65" stroke="#1a1a1a" stroke-width="1.5"/>
  <line x1="58" y1="242" x2="65" y2="235" stroke="#1a1a1a" stroke-width="1.5"/>
  <line x1="242" y1="242" x2="235" y2="235" stroke="#1a1a1a" stroke-width="1.5"/>
  <line x1="58" y1="58" x2="65" y2="65" stroke="#1a1a1a" stroke-width="1.5"/>

  <!-- HP Monogram -->
  <!-- H -->
  <text x="118" y="170" font-family="'Didot', 'Playfair Display', 'Georgia', serif" font-size="80" font-weight="400" fill="#1a1a1a" text-anchor="middle">H</text>
  <!-- P overlapping -->
  <text x="182" y="170" font-family="'Didot', 'Playfair Display', 'Georgia', serif" font-size="80" font-weight="400" fill="#1a1a1a" text-anchor="middle">P</text>

  <!-- Gold accent dot -->
  <circle cx="150" cy="185" r="3" fill="url(#goldMono)"/>

  <!-- Inner decorative ring -->
  <circle cx="150" cy="150" r="95" fill="none" stroke="url(#goldMono)" stroke-width="0.8"/>
</svg>